<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clawline Agent</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div id="sidebar">
    <div id="sidebar-header">
      <span>History</span>
      <button id="sidebar-close" title="Close">&times;</button>
    </div>
    <div id="conversation-list"></div>
  </div>
  <div id="sidebar-backdrop"></div>
  <div id="main">
    <div id="header">
      <button id="history-btn" title="History">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div style="flex:1"></div>
      <div id="hook-status" title="Hook Bridge: disconnected">
        <span id="hook-dot"></span>
        <span id="hook-label">Bridge</span>
      </div>
      <button id="settings-btn" title="Settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
      <button id="new-chat" title="New conversation">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <!-- Bridge Status Panel -->
    <div id="bridge-panel" style="display:none">
      <div class="bp-section">
        <div class="bp-row">
          <span class="bp-key">Hook Bridge</span>
          <span id="bp-hook-val" class="bp-val bp-off">Disconnected</span>
        </div>
        <div class="bp-row">
          <span class="bp-key">API Endpoint</span>
          <span id="bp-api-val" class="bp-val bp-off">Unknown</span>
        </div>
      </div>
      <div class="bp-section">
        <div class="bp-row">
          <span class="bp-key">Tasks</span>
          <span id="bp-task-stats" class="bp-val">0 done / 0 err</span>
        </div>
      </div>
      <div class="bp-section bp-log-section">
        <div class="bp-row"><span class="bp-key">Activity Log</span></div>
        <div id="bp-log"></div>
      </div>
    </div>
    <div id="settings-panel" style="display:none">
      <div class="settings-row">
        <label for="cfg-api-url">API URL</label>
        <input id="cfg-api-url" type="text" placeholder="http://127.0.0.1:4819" spellcheck="false">
      </div>
      <div class="settings-row">
        <label for="cfg-api-key">API Key</label>
        <input id="cfg-api-key" type="password" placeholder="sk-ant-... (optional if using proxy)" spellcheck="false">
      </div>
      <div class="settings-row settings-actions">
        <button id="cfg-save">Save</button>
        <button id="cfg-cancel">Cancel</button>
      </div>
      <div class="settings-divider"></div>
      <div class="settings-row">
        <span class="settings-section-label">History</span>
      </div>
      <div class="settings-row settings-actions">
        <button id="cfg-export">Export</button>
        <button id="cfg-import-btn">Import</button>
        <input type="file" id="cfg-import-file" accept=".json" hidden>
      </div>
    </div>
    <div id="messages"></div>
    <div id="custom-mode-editor" style="display:none">
      <textarea id="custom-mode-text" placeholder="Enter custom behavior instructions..."></textarea>
      <div class="custom-mode-actions">
        <button id="custom-mode-save">Save</button>
        <button id="custom-mode-cancel">Cancel</button>
      </div>
    </div>
    <div id="input-area">
      <div id="status"></div>
      <div id="input-wrapper">
        <textarea id="input" rows="1" placeholder="Reply to Claude..." autofocus></textarea>
        <div id="attachments"></div>
        <div id="input-toolbar">
          <label id="upload-btn" title="Attach image">
            <input type="file" id="file-input" accept="image/*" hidden>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </label>
          <select id="model-select">
            <option value="claude-sonnet-4-6">Sonnet 4.6</option>
            <option value="claude-opus-4-6">Opus 4.6</option>
            <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
          </select>
          <select id="mode-select" title="Skill mode">
            <option value="general">General</option>
            <option value="qa">QA Test</option>
            <option value="scraper">Scraper</option>
            <option value="custom">Custom</option>
          </select>
          <button id="thinking-toggle" class="toggle-btn" title="Extended Thinking">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          </button>
          <button id="fast-toggle" class="toggle-btn" title="Fast Mode (Haiku)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </button>
          <select id="steps-select" title="Max steps per task">
            <option value="25">25</option>
            <option value="50">50</option>
            <option value="200" selected>200</option>
            <option value="999">&infin;</option>
          </select>
          <div id="input-toolbar-spacer"></div>
          <button id="stop" style="display:none" title="Stop">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
          </button>
          <button id="send" title="Send">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
